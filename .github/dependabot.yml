version: 2
updates:
  # npm の依存関係を監視
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # マイナー/パッチ更新はまとめて1つのPRに
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions のバージョン（SHA）を監視
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
